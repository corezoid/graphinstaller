{{- if .Values.global.graphinstaller.graphinstaller.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "graphinstaller.serviceAccountName" . }}
  labels:
    {{- include "graphinstaller.labels" . | nindent 4 }}
  {{- with .Values.global.graphinstaller.graphinstaller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.global.graphinstaller.graphinstaller.serviceAccount.automount }}
{{- end }}
