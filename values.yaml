# Default values for graphinstaller.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  imageInit:
    repository: hub.corezoid.com/hub.docker.com/library/alpine
    pullPolicy: IfNotPresent
    tag: "3.21"
#   imagePullSecrets:
#     name: develop-middleware-registry-secret
  graphinstaller:
    graphinstaller:
      replicaCount: 1
      image:
        repository: hub.corezoid.com/public/graphinstaller
        pullPolicy: IfNotPresent
        # Overrides the image tag whose default is the chart appVersion.
      config_file: "graph-installer.json"
      config:
        log_level: debug
        workspace_id: SET_NULL_WORKSPACE_ID
        internal_host: '${INTERNAL_HOST}'
        postgres:
          host: DB_HOST
          port: 5432
          database: graphinstaller
          user: graphinstaller
          password: graphinstaller
        metrics:
          listen_port: 8050
        api_server:
          listen_port: 8080
        control:
          host: https://simulator.example.com
          #insecure_skip_verify: true
        corezoid:
          host: https://corezoid.example.com
          #insecure_skip_verify: true
        sa:
          host: https://account.example.com
          secretKey: secret
          insecure_skip_verify: true
          name: graph-installer
      installs_file: "installs.yml"
      installs:
        - name: apigw
          file: files/api_gateway.graph
          menuInstall:
            - title: API Gateway
              ref: api_gateway
              authorized: true
          postInstall:
            - action: envVar
              shortName: host
              dataType: raw
              value: https://corezoid.example.com
            - action: envVar
              shortName: host-admin
              dataType: raw
              value: https://corezoid.example.com
            - action: envVar
              shortName: host-control
              dataType: raw
              value: https://simulator.example.com
            - action: envVar
              shortName: host-account
              dataType: raw
              value: https://account.example.com
            - action: envVar
              shortName: api-gw-host
              dataType: raw
              value: https://api-apigw.example.com
      imagePullSecrets: []
      nameOverride: ""
      fullnameOverride: ""
      serviceAccount:
        # Specifies whether a service account should be created
        create: false
        # Automatically mount a ServiceAccount's API credentials?
        automount: true
        # Annotations to add to the service account
        annotations: {}
        # The name of the service account to use.
        # If not set and create is true, a name is generated using the fullname template
        name: ""
      podAnnotations: {}
      podLabels: {}
      podSecurityContext: {}
      # fsGroup: 2000

      securityContext: {}
      # capabilities:
      #   drop:
      #   - ALL
      # readOnlyRootFilesystem: true
      # runAsNonRoot: true
      # runAsUser: 1000

      service:
        type: ClusterIP
        port: 80
      ingress:
        enabled: false # Not used, must be set to false
        className: "private-nginx"
        annotations: {}
          # kubernetes.io/ingress.class: nginx
          # kubernetes.io/tls-acme: "true"
        hosts:
          - host: graphinstaller.example.company
            paths:
              - path: /
                pathType: ImplementationSpecific
        tls: []
        #  - secretName: chart-example-tls
        #    hosts:
        #      - graphinstaller.example.company
      resources: {}
      # We usually recommend not to specify default resources and to leave this as a conscious
      # choice for the user. This also increases chances charts run on environments with little
      # resources, such as Minikube. If you do want to specify resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi

      livenessProbe: {}
      # livenessProbe:
      #   httpGet:
      #     path: /metrics
      #     port: 8050
      readinessProbe: {}
      # readinessProbe:
      #   httpGet:
      #     path: /metrics
      #     port: 8050

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 100
        targetCPUUtilizationPercentage: 80
        # targetMemoryUtilizationPercentage: 80
      # Additional volumes on the output Deployment definition.
      volumes: []
      # - name: foo
      #   secret:
      #     secretName: mysecret
      #     optional: false

      # Additional volumeMounts on the output Deployment definition.
      volumeMounts: []
      # - name: foo
      #   mountPath: "/etc/foo"
      #   readOnly: true
      nodeSelector: {}
      affinity: {}
      tolerations: {}