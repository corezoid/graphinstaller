# Default values for graphinstaller.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  imageInit:
    repository: docker-hub.middleware.biz/simulator/alpine
    pullPolicy: IfNotPresent
    tag: "3.20"
  imagePullSecrets: {}

  control:
    graphinstaller:
      replicaCount: 1

      image:
        repository: graphinstaller
        pullPolicy: IfNotPresent
        # Overrides the image tag whose default is the chart appVersion.

      config_file: "config.yaml"
      config:
        log_level: debug
        log_text_handler: true
        workspace_id: 111111
        postgres:
          host: localhost
          port: 5432
          database: graphinstaller
          user: graphinstaller
          password: graphinstaller
        metrics:
          listen_port: 8050
        control:
          host: https://simulator.example.com
          insecure_skip_verify: true
        sa:
          host: https://account.example.com
          secretKey: secret
          insecure_skip_verify: true
          name: graph-installer

      installs_file: "installs.yml"
      installs:
        - name: apigw
          file: files/apigw.graph
          postInstall:
            - action: task
              alias: sd-config
              ref: config
              data:
                api_gw_host: https://api-apigw.example.com
                host: https://dev.example.com
            - action: envVar
              shortName: test
              dataType: raw
              value: test_value

      imagePullSecrets: []
      nameOverride: ""
      fullnameOverride: ""

      serviceAccount:
        # Specifies whether a service account should be created
        create: true
        # Automatically mount a ServiceAccount's API credentials?
        automount: true
        # Annotations to add to the service account
        annotations: {}
        # The name of the service account to use.
        # If not set and create is true, a name is generated using the fullname template
        name: ""

      podAnnotations: {}
      podLabels: {}

      podSecurityContext: {}
        # fsGroup: 2000

      securityContext: {}
        # capabilities:
        #   drop:
        #   - ALL
        # readOnlyRootFilesystem: true
        # runAsNonRoot: true
        # runAsUser: 1000

      service:
        type: ClusterIP
        port: 80

      ingress:
        enabled: false
        className: "private-nginx"
        annotations: {}
          # kubernetes.io/ingress.class: nginx
          # kubernetes.io/tls-acme: "true"
        hosts:
          - host: graphinstaller.example.company
            paths:
              - path: /
                pathType: ImplementationSpecific
        tls: []
        #  - secretName: chart-example-tls
        #    hosts:
        #      - graphinstaller.example.company

      resources: {}
        # We usually recommend not to specify default resources and to leave this as a conscious
        # choice for the user. This also increases chances charts run on environments with little
        # resources, such as Minikube. If you do want to specify resources, uncomment the following
        # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
        # limits:
        #   cpu: 100m
        #   memory: 128Mi
        # requests:
        #   cpu: 100m
        #   memory: 128Mi

      livenessProbe: {}
      # livenessProbe:
      #   httpGet:
      #     path: /metrics
      #     port: 8050
      readinessProbe: {}
      # readinessProbe:
      #   httpGet:
      #     path: /metrics
      #     port: 8050

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 100
        targetCPUUtilizationPercentage: 80
        # targetMemoryUtilizationPercentage: 80

      # Additional volumes on the output Deployment definition.
      volumes: []
      # - name: foo
      #   secret:
      #     secretName: mysecret
      #     optional: false

      # Additional volumeMounts on the output Deployment definition.
      volumeMounts: []
      # - name: foo
      #   mountPath: "/etc/foo"
      #   readOnly: true
      nodeSelector: {}
      affinity: {}
      tolerations: []